apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobsathi-ui
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jobsathi-ui
  template:
    metadata:
      labels:
        app: jobsathi-ui
    spec:
      containers:
      - name: jobsathi-ui
        image: rachita123/jobsathi-ui:latest   # Docker Hub image
        ports:
        - containerPort: 80
